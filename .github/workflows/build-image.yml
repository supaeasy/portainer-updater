name: Build and publish analysis-layer image

on:
  push:
    branches: [master]
    paths:
      - "analysis-layer/**"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: ./analysis-layer
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/portainer-updater-analysis:latest
            ghcr.io/${{ github.repository_owner }}/portainer-updater-analysis:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
